version: '3.9'

services:
  db:
    image: postgres:13
    container_name: conduit_db
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_PORT: 5433
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
